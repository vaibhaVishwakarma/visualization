<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LeetCode XXX - [Algorithm Name] Visualizer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
    /* =========================================
       1. GLOBAL VARIABLES & THEME
       ========================================= */
    :root {
        --bg-main: #1e1e1e;    /* VS Code Main Dark */
        --bg-panel: #252526;   /* VS Code Panel Dark */
        --bg-header: #333333;
        --text-main: #d4d4d4;
        
        /* ALGORITHM SPECIFIC COLORS */
        --accent: #4caf50;     /* Green: Success, Target Found, Match */
        --active: #ff9800;     /* Orange: Current Index, Active Cell */
        --neighbor: #2196f3;   /* Blue: Neighbor, Left Pointer, Reading Variable */
        --purple: #9c27b0;     /* Purple: Right Pointer, Secondary State */
        --danger: #f44336;     /* Red: Mismatch, Out of Bounds, Discarded */
        --border: #444;
    }

    body {
        margin: 0; background: var(--bg-main); color: var(--text-main);
        font-family: 'Segoe UI', Consolas, monospace; height: 100vh; display: flex; flex-direction: column;
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4f4f4f; }

    /* =========================================
       2. HEADER & INPUT CONTROLS
       ========================================= */
    .header {
        padding: 12px 20px; background: var(--bg-header); border-bottom: 1px solid #111;
        display: flex; gap: 15px; align-items: center; flex-wrap: wrap; z-index: 20;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .header-group {
        display: flex; align-items: center; gap: 8px; background: var(--bg-panel);
        padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border);
    }
    select, input, button, textarea {
        background: var(--bg-main); color: white; border: 1px solid #555;
        padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 13px;
    }
    button { cursor: pointer; transition: 0.2s; }
    button:hover { background: #555; }
    button.primary { background: #007acc; font-weight: bold; border:none; }
    button.primary:hover { background: #005f9e; }

    /* =========================================
       3. MAIN LAYOUT & RESIZER
       ========================================= */
    .main { display: flex; flex: 1; overflow: hidden; }

    .left-panel {
        width: 500px; min-width: 250px; max-width: 75vw;
        display: flex; flex-direction: column; background: var(--bg-main); padding: 15px;
    }

    .resizer {
        width: 6px; background: #2d2d2d; cursor: col-resize; transition: background 0.2s;
        display: flex; justify-content: center; align-items: center; z-index: 10;
        border-left: 1px solid #111; border-right: 1px solid #111;
    }
    .resizer:hover, .resizer.resizing { background: #007acc; }
    .resizer::after { content: "⋮"; color: #888; font-size: 14px; }

    .right-panel {
        flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; min-width: 300px;
        background: #121212;
    }

    .panel {
        margin-bottom: 15px; background: var(--bg-panel); border-radius: 6px; padding: 15px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #333;
    }
    .panel:last-child { margin-bottom: 0; }
    h3 { margin-top: 0; margin-bottom: 10px; font-size: 12px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }

    /* =========================================
       4. CODE BLOCK SYNTAX HIGHLIGHTING
       ========================================= */
    .code-container {
        flex: 1; overflow: auto; background: #1e1e1e; border-radius: 4px; padding: 0;
        border: 1px solid #333; display: flex; min-height: 200px;
    }
    .code-wrapper { display: flex; width: 100%; flex: 1; }
    .code-line-numbers {
        background: #252526; color: #858585; padding: 10px 12px; border-right: 1px solid #3e3e42;
        user-select: none; font-family: Consolas, monospace; font-size: 13px; line-height: 1.5;
        text-align: right; min-width: 30px; overflow: hidden; flex-shrink: 0;
    }
    .code-line-number { padding: 0; display: block; }
    .code-lines { flex: 1; overflow: auto; }
    .code-lines pre { margin: 0; padding: 10px; background: transparent; border: none; font-family: Consolas, monospace; font-size: 13px; line-height: 1.5; }
    .code-lines code { font-family: Consolas, monospace; font-size: 13px; background: transparent; padding: 0; }
    .hljs { background: transparent !important; color: #d4d4d4; }
    .code-line { padding: 0 8px; white-space: pre; border-radius: 0; border-left: 3px solid transparent; display: block; }
    .active-line { background: rgba(255, 213, 79, 0.15); border-left: 3px solid #ffd54f; }

    /* =========================================
       5. STANDARD UI COMPONENTS
       ========================================= */
    .var-container { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;}
    .var-box {
        background: #1e1e1e; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; text-align: center; flex: 1;
        font-size: 13px; color: #bbb;
    }
    .var-value { font-size: 18px; font-weight: bold; margin-top: 4px; font-family: Consolas;}
    
    .array-container { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0 25px 0;}
    .array-item { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; position: relative;}
    .array-idx { font-size: 11px; color: #888; margin-bottom: 2px; font-family: Consolas; }
    .array-cell {
        width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
        border: 2px solid #555; border-radius: 6px; background: #1e1e1e; font-weight: bold; font-size: 15px;
        transition: all 0.3s; font-family: Consolas; color: #d4d4d4;
    }

    .ptr-label { position: absolute; bottom: -22px; font-size: 12px; font-weight: bold; font-family: Consolas; white-space: nowrap; color: #aaa; }

    .phase-indicator {
        padding: 8px 12px; background: #2d2d2d; border-radius: 6px; border: 1px solid #444; font-weight: bold;
        text-align: center; margin-bottom: 15px; color: var(--active); font-size: 15px; font-family: Consolas;
    }

    /* =========================================
       6. EXECUTION LOG (FIXED SCROLL & BLEED)
       ========================================= */
    /* By making the panel a flex column with hidden overflow, the child log can scroll independently */
    .log-panel {
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden;
    }
    .log {
        flex: 1; 
        overflow-y: auto; 
        font-family: Consolas, monospace; 
        font-size: 13px; 
        line-height: 1.5;
        padding: 10px; 
        background: #1e1e1e; 
        border-radius: 4px; 
        border: 1px solid #444;
        margin: 0;
    }
    .log-success { color: var(--accent); font-weight: bold; }
    .log-update { color: var(--active); }
    .log-danger { color: var(--danger); font-style: italic;}
    .log-info { color: var(--neighbor); }
    
    .footer-note {
        font-size: 12px; color: #bbb; line-height: 1.5; background: #1e1e1e; padding: 10px; border-radius: 6px; border-left: 4px solid var(--active);
    }

    /* ALGORITHM SPECIFIC CLASSES GO HERE */
    .cell-active { border-color: var(--active); box-shadow: 0 0 12px rgba(255, 152, 0, 0.6); color: var(--active); transform: scale(1.1); z-index: 5;}
    
</style>
</head>
<body>

<div class="header">
    <div class="header-group">
        <label>Test Cases:</label>
        <select id="testCases" onchange="loadSelectedTest()">
            <option value="tc1">1. Default Test Case</option>
        </select>
    </div>

    <div class="header-group">
        <label>Input:</label>
        <input id="inputData" type="text" style="width: 150px;" value="1,2,3,4,5">
    </div>

    <button class="primary" onclick="prepareExecution()">Build & Run Algorithm</button>
</div>

<div class="main">
    <div class="left-panel" id="leftPanel">
        <h3 style="margin-bottom: 5px;">SOURCE CODE</h3>
        <div id="code" class="code-container"></div>
        <br>
        <div class="panel" style="margin:0; padding:12px;">
            <h3 style="margin-bottom: 5px;">Complexity Analysis</h3>
            <div class="footer-note">
                <strong>Time Complexity: O(?)</strong><br>
                Explain time complexity logic.<br><br>
                <strong>Space Complexity: O(?)</strong><br>
                Explain space complexity logic.
            </div>
        </div>
    </div>

    <div class="resizer" id="dragMe"></div>

    <div class="right-panel">
        <!-- Playback Controls -->
        <div class="panel" style="display: flex; gap: 10px; background: #2d2d2d; border-color: #444; margin-bottom: 15px; padding: 12px;">
            <button onclick="play()" style="background:#4caf50; color:white; font-weight:bold;">▶ Play</button>
            <button onclick="pause()">⏸ Pause</button>
            <button onclick="prevStep()">⏮ Step Back</button>
            <button onclick="nextStep()">⏭ Next Step</button>
        </div>

        <!-- Visualization Canvas -->
        <div class="panel">
            <div id="phaseIndicator" class="phase-indicator">Waiting to Start</div>

            <div class="var-container">
                <div class="var-box">Variable 1<div class="var-value" id="val-1" style="color:var(--active);">-</div></div>
                <div class="var-box">Variable 2<div class="var-value" id="val-2" style="color:var(--neighbor);">-</div></div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
                <h3 style="margin:0;">Data Array</h3>
            </div>
            <div id="mainArray" class="array-container" style="margin-bottom: 10px;"></div>
        </div>

        <!-- Execution Log Panel -->
        <div class="panel log-panel">
            <h3 style="flex-shrink: 0; margin-bottom: 10px;">Execution Log</h3>
            <div class="log" id="log"></div>
        </div>
    </div>
</div>

<script>
/* =========================================
   1. SPLITTER / RESIZER LOGIC
   ========================================= */
const resizer = document.getElementById('dragMe');
const leftPanel = document.getElementById('leftPanel');
let isResizing = false;
let startX, startWidth;

resizer.addEventListener('mousedown', function(e) {
    isResizing = true;
    startX = e.clientX;
    startWidth = leftPanel.getBoundingClientRect().width;
    resizer.classList.add('resizing');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    const newWidth = startWidth + (e.clientX - startX);
    if (newWidth >= 250 && newWidth <= window.innerWidth * 0.75) {
        leftPanel.style.width = `${newWidth}px`;
    }
});

document.addEventListener('mouseup', function() {
    if (isResizing) {
        isResizing = false;
        resizer.classList.remove('resizing');
        document.body.style.cursor = 'default';
        document.body.style.userSelect = '';
    }
});

/* =========================================
   2. CODE INITIALIZATION
   ========================================= */
const CODE_SNIPPET = [
    "class Solution {",
    "    public int solve(int[] nums) {",
    "        // Example logic",
    "        return 0;",
    "    }",
    "}"
];

const TEST_CASES = {
    tc1: "1,2,3,4,5"
};

let events = [], ptr = 0, autoTimer = null;

function renderCode() {
    let lineNumbers = CODE_SNIPPET.map((_, i) => `<div class='code-line-number' id='linenum${i+1}'>${i + 1}</div>`).join('');
    let codeText = CODE_SNIPPET.join('\n');
    let highlightedLines;
    try {
        let highlightedCode = hljs.highlight(codeText, { language: 'java' }).value;
        highlightedLines = highlightedCode.split('\n');
    } catch(e) {
        highlightedLines = codeText.split('\n');
    }
    
    let wrappedLines = highlightedLines.map((line, i) => `<div class='code-line' id='line${i+1}'>${line || ' '}</div>`).join('');
    let codeHtml = `<pre><code class="hljs java">${wrappedLines}</code></pre>`;
    
    document.getElementById("code").innerHTML = `<div class='code-wrapper'><div class='code-line-numbers'>${lineNumbers}</div><div class='code-lines'>${codeHtml}</div></div>`;
}
renderCode();

function highlight(line) {
    document.querySelectorAll(".code-line").forEach(x => x.classList.remove("active-line"));
    if(line !== null && line !== undefined) {
        let el = document.getElementById("line" + line);
        if(el) {
            el.classList.add("active-line");
            el.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
        }
    }
}

/* =========================================
   3. LOGGING & UTILS
   ========================================= */
// Updated to use createElement for high-performance sequential DOM writing.
function log(msg, type = "") {
    const div = document.getElementById("log");
    const entry = document.createElement("div");
    if (type) entry.className = type;
    entry.innerHTML = msg;
    div.appendChild(entry);
    
    // Automatically scroll to bottom as new entries are appended
    div.scrollTop = div.scrollHeight;
}

function loadSelectedTest() {
    const tc = TEST_CASES[document.getElementById("testCases").value];
    document.getElementById("inputData").value = tc;
}

/* =========================================
   4. GENERATOR FUNCTION (ALGORITHM CORE)
   ========================================= */
// Completely detaches algorithmic logic from DOM operations.
function* simulateAlgorithm() {
    let inputStr = document.getElementById("inputData").value;
    let nums = inputStr.split(',').map(Number).filter(n => !isNaN(n));
    if (nums.length === 0) return;

    // A helper to strictly capture all UI variables at a specific moment in time
    const snap = (line, msg, type="info", actionObj={}) => ({
        line, msg, type,
        // CRITICAL: Always clone mutable structures (arrays, objects) so history isn't overwritten
        nums: [...nums], 
        var1: actionObj.var1 !== undefined ? actionObj.var1 : null,
        var2: actionObj.var2 !== undefined ? actionObj.var2 : null,
        activeIdx: actionObj.activeIdx !== undefined ? actionObj.activeIdx : null
    });

    yield snap(2, `Starting Algorithm initialization.`, "info");

    for (let i = 0; i < nums.length; i++) {
        yield snap(4, `Processing index ${i}, value ${nums[i]}`, "info", { activeIdx: i, var1: i, var2: nums[i] });
        
        if (nums[i] % 2 === 0) {
            yield snap(5, `Found an even number!`, "success", { activeIdx: i, var1: i, var2: nums[i] });
        } else {
            yield snap(5, `Found an odd number.`, "danger", { activeIdx: i, var1: i, var2: nums[i] });
        }
    }

    yield snap(7, `Algorithm completed.`, "success");
}

/* =========================================
   5. EXECUTION & DOM RENDERING
   ========================================= */
function prepareExecution() {
    try {
        events = [];
        const g = simulateAlgorithm();
        while(true) {
            const r = g.next();
            if(r.done) break;
            events.push(r.value);
        }
        
        document.getElementById("log").innerHTML = ""; // Clear log entirely
        jumpToStep(0);
        log(`[System] Prepared ${events.length} steps. Click Play or Next Step.`);
    } catch(err) {
        console.error(err);
        log(`[Error] Execution failed: ${err.message}`, "log-danger");
    }
}

// Maps a specific state snapshot `e` to the HTML UI
// CRITICAL FIX: Ensure `document.getElementById(...)` exists in HTML before modifying `innerText`.
function applyEventData(e) {
    document.getElementById("phaseIndicator").innerText = e.activeIdx !== null ? `Evaluating Index ${e.activeIdx}` : "Setup Phase";
    document.getElementById("val-1").innerText = e.var1 !== null ? e.var1 : "-";
    document.getElementById("val-2").innerText = e.var2 !== null ? e.var2 : "-";

    if (e.nums && e.nums.length > 0) {
        const renderArray = () => e.nums.map((val, idx) => {
            let cls = "";
            let ptrLbl = "";

            if (idx === e.activeIdx) {
                cls += "cell-active";
                ptrLbl = "i";
            }

            let lblHtml = ptrLbl ? `<div class="ptr-label" style="color:var(--active);">${ptrLbl}</div>` : "";
            return `<div class="array-item"><span class="array-idx">${idx}</span><div class="array-cell ${cls}">${val}${lblHtml}</div></div>`;
        }).join('');
        document.getElementById("mainArray").innerHTML = renderArray();
    }

    if (e.line !== undefined && e.line !== null) highlight(e.line);
}

/* =========================================
   6. PLAYBACK CONTROLS
   ========================================= */
function jumpToStep(targetIndex) {
    document.getElementById("log").innerHTML = ""; // Clear log for clean rewrite
    ptr = 0;
    while(ptr <= targetIndex && ptr < events.length) {
        const isLast = (ptr === targetIndex);
        const e = events[ptr++];
        
        // Render UI only on the final jump step to prevent UI lag during time-travel
        if (isLast) applyEventData(e);
        
        // Re-print the log history up to this point sequentially
        if (e.type === "success") log(e.msg, "log-success");
        else if (e.type === "update") log(e.msg, "log-update");
        else if (e.type === "info") log(e.msg, "log-info");
        else if (e.type === "danger") log(e.msg, "log-danger");
        else log(`> ${e.msg}`);
    }
}

function nextStep() {
    if(ptr >= events.length) { pause(); return; }
    jumpToStep(ptr);
}
function prevStep() {
    pause();
    if(ptr <= 1) { jumpToStep(0); return; }
    jumpToStep(ptr - 2);
}
function play() {
    pause();
    if (ptr >= events.length) prepareExecution(); // Restart if at end
    nextStep(); 
    autoTimer = setInterval(nextStep, 1000); 
}
function pause() { if(autoTimer) clearInterval(autoTimer); }

/* =========================================
   7. INITIALIZATION & KEYBOARD BINDINGS
   ========================================= */
window.onload = () => {
    loadSelectedTest();
    prepareExecution();
};

document.addEventListener('keydown', function(event) {
    // Left/Right Arrow keys mapped directly to control flow
    if (event.key === 'ArrowRight') {
        if (typeof nextStep === 'function') nextStep();
    } else if (event.key === 'ArrowLeft') {
        if (typeof prevStep === 'function') prevStep();
    }
});
</script>
</body>
</html>
